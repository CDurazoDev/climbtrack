services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: climbtrack
      POSTGRES_USER: climbtrack
      POSTGRES_PASSWORD: climbtrack_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U climbtrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.8
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: meili_dev_key_climbtrack

volumes:
  postgres_data:
