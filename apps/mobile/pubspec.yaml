name: climbtrack
description: Training app for climbing and bouldering

publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  go_router: ^14.0.0

  dio: ^5.4.0
  retrofit: ^4.1.0

  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  drift: ^2.19.0
  sqlite3_flutter_libs: ^0.5.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.0

  intl: ^0.20.2

  google_fonts: ^6.2.1

  fl_chart: ^0.68.0

  lottie: ^3.1.0

  equatable: ^2.0.7
  dartz: ^0.10.1

  sentry_flutter: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  retrofit_generator: ^9.7.0
  drift_dev: ^2.19.0
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  patrol: ^3.10.0

flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
